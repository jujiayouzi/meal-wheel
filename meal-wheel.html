<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 今天吃什么 - 大转盘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    padding: 20px;
}

.container {
    display: flex;
    gap: 40px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 900px;
}

/* ─── 转盘 ─── */
.wheel-wrapper {
    position: relative;
    flex-shrink: 0;
}

canvas { display: block; }

.pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 36px solid #e94560;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,.4));
    z-index: 10;
}

.center-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70px; height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e94560, #c23152);
    border: 4px solid #fff;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(233,69,96,.5);
    transition: transform .15s;
    z-index: 5;
}
.center-btn:hover { transform: translate(-50%, -50%) scale(1.08); }
.center-btn:active { transform: translate(-50%, -50%) scale(.95); }

/* ─── 控制面板 ─── */
.panel {
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 20px;
    padding: 28px;
    min-width: 300px;
    max-width: 360px;
    color: #e0e0e0;
}

.panel h2 {
    font-size: 22px;
    margin-bottom: 8px;
    color: #fff;
}

.subtitle {
    font-size: 13px;
    color: #999;
    margin-bottom: 20px;
}

/* ─── 添加 ─── */
.add-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.add-row input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.08);
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border .2s;
}
.add-row input::placeholder { color: #888; }
.add-row input:focus { border-color: #e94560; }

.add-row button {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #e94560, #c23152);
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity .2s;
}
.add-row button:hover { opacity: .85; }

/* ─── 列表 ─── */
.food-list {
    max-height: 280px;
    overflow-y: auto;
    margin-bottom: 18px;
}

.food-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,.05);
    margin-bottom: 6px;
    transition: background .2s;
}
.food-item:hover { background: rgba(255,255,255,.1); }

.food-item span { font-size: 15px; color: #e0e0e0; }

.food-item .del-btn {
    background: none;
    border: none;
    color: #e94560;
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background .2s;
}
.food-item .del-btn:hover { background: rgba(233,69,96,.15); }

/* ─── 底部按钮 ─── */
.bottom-row {
    display: flex;
    gap: 10px;
}

.bottom-row button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.06);
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
}
.bottom-row button:hover { background: rgba(255,255,255,.12); color: #fff; }

.result {
    text-align: center;
    margin-top: 16px;
    font-size: 20px;
    font-weight: bold;
    min-height: 32px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,.4);
}

/* ─── 弹窗 ─── */
.toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #e94560;
    color: #fff;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 999;
    animation: fadeInOut 2s ease forwards;
    pointer-events: none;
}
@keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    75% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="container">
    <!-- 转盘 -->
    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheel" width="420" height="420"></canvas>
        <button class="center-btn" id="spinBtn">开转</button>
    </div>

    <!-- 控制面板 -->
    <div class="panel">
        <h2>🍜 今天吃什么</h2>
        <p class="subtitle">添加你想吃的，转一转决定！</p>

        <div class="add-row">
            <input id="foodInput" placeholder="输入菜名，如：麻辣烫" maxlength="20">
            <button id="addBtn">＋ 添加</button>
        </div>

        <div class="food-list" id="foodList"></div>

        <div class="bottom-row">
            <button id="clearBtn">清空全部</button>
            <button id="resetBtn">恢复默认</button>
        </div>

        <div class="result" id="result"></div>
    </div>
</div>

<div id="toastContainer"></div>

<script>
// ─── 数据 ───
const DEFAULTS = ['麻辣烫', '黄焖鸡', '沙县小吃', '兰州拉面', '螺蛳粉', '盖浇饭', '麻辣香锅', '汉堡薯条', '寿司', '饺子', '酸菜鱼', '烤肉饭'];

let foods = loadFoods();

function loadFoods() {
    const saved = localStorage.getItem('meal_wheel_foods');
    return saved ? JSON.parse(saved) : [...DEFAULTS];
}

function saveFoods() { localStorage.setItem('meal_wheel_foods', JSON.stringify(foods)); }

// ─── Canvas 转盘 ───
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const SIZE = 420;
const CENTER = SIZE / 2;
const RADIUS = CENTER - 10;

const COLORS = [
    '#e94560','#ff6b6b','#feca57','#54a0ff','#5f27cd','#01a3a4',
    '#ff9f43','#10ac84','#ee5a24','#6c5ce7','#fd79a8','#00b894',
    '#e17055','#a29bfe','#fab1a0','#81ecec','#ff7675','#74b9ff',
    '#fdcb6e','#00cec9','#e056a0','#636e72','#d63031','#0984e3',
];

let currentAngle = 0;
let spinning = false;

function drawWheel() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    if (foods.length === 0) {
        ctx.fillStyle = '#555';
        ctx.font = '20px "PingFang SC","Microsoft YaHei"';
        ctx.textAlign = 'center';
        ctx.fillText('请先添加食物 🍽️', CENTER, CENTER + 8);
        return;
    }
    const n = foods.length;
    const arc = (2 * Math.PI) / n;

    for (let i = 0; i < n; i++) {
        // 从 -π/2（12点/指针位置）开始画，扇区0对指针
        const startAngle = -Math.PI / 2 + currentAngle + i * arc;
        const endAngle = startAngle + arc;

        // 扇形
        ctx.beginPath();
        ctx.moveTo(CENTER, CENTER);
        ctx.arc(CENTER, CENTER, RADIUS, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,.25)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 文字
        ctx.save();
        ctx.translate(CENTER, CENTER);
        ctx.rotate(startAngle + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 15px "PingFang SC","Microsoft YaHei"';
        ctx.shadowColor = 'rgba(0,0,0,.4)';
        ctx.shadowBlur = 4;
        const text = foods[i].length > 6 ? foods[i].slice(0,5) + '…' : foods[i];
        ctx.fillText(text, RADIUS - 20, 6);
        ctx.restore();
    }

    // 中心圆
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, 35, 0, 2 * Math.PI);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.4)';
    ctx.lineWidth = 3;
    ctx.stroke();
}

function getSelectedFood() {
    if (foods.length === 0) return null;
    const n = foods.length;
    const arc = (2 * Math.PI) / n;
    // 扇区0从12点（-π/2）开始，指针固定指向12点
    // currentAngle是旋转量，指针指向的扇区 = floor(当前旋转角 / 扇区弧度) 再取反
    // 顺时针旋转 currentAngle 弧度 → 扇区0从12点顺时针移开 → 指针落入了 -currentAngle/arc 取整的扇区
    let idx = Math.floor(-currentAngle / arc) % n;
    if (idx < 0) idx += n;
    return foods[idx];
}

// ─── 物理旋转模拟 ───
// 物理参数
const FRICTION = 0.985;        // 每帧衰减系数（越大转越久）
const MIN_SPEED = 0.001;       // 角速度低于此值停止
const MIN_VELOCITY = 0.30;     // 初始最小角速度 (弧度/帧)
const MAX_VELOCITY = 0.55;     // 初始最大角速度 (弧度/帧)

let angularVelocity = 0;

function spin() {
    if (spinning || foods.length < 2) {
        if (foods.length < 2) showToast('至少需要 2 个选项才能转！');
        return;
    }
    spinning = true;
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('result').textContent = '';

    // 随机初始速度（谁也不知道会停在哪）
    angularVelocity = MIN_VELOCITY + Math.random() * (MAX_VELOCITY - MIN_VELOCITY);

    function physicsTick() {
        // 摩擦减速
        angularVelocity *= FRICTION;

        // 旋转轮盘
        currentAngle += angularVelocity;

        drawWheel();

        if (angularVelocity > MIN_SPEED) {
            requestAnimationFrame(physicsTick);
        } else {
            // 停下来了
            spinning = false;
            document.getElementById('spinBtn').disabled = false;
            const food = getSelectedFood();
            document.getElementById('result').textContent = `🎉 今天就吃：${food}！`;
            showToast(`🎉 ${food}`);
        }
    }
    requestAnimationFrame(physicsTick);
}

// ─── 列表渲染 ───
function renderList() {
    const container = document.getElementById('foodList');
    container.innerHTML = foods.map((f, i) => `
        <div class="food-item">
            <span>${i + 1}. ${f}</span>
            <button class="del-btn" data-index="${i}">✕</button>
        </div>
    `).join('');

    // 删除事件
    container.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            foods.splice(parseInt(btn.dataset.index), 1);
            saveFoods();
            drawWheel();
            renderList();
        });
    });
}

// ─── Toast ───
function showToast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 2100);
}

// ─── 事件绑定 ───
document.getElementById('spinBtn').addEventListener('click', spin);
document.getElementById('addBtn').addEventListener('click', () => {
    const input = document.getElementById('foodInput');
    const name = input.value.trim();
    if (!name) { showToast('请输入菜名'); return; }
    if (foods.includes(name)) { showToast('已经添加过了'); return; }
    foods.push(name);
    saveFoods();
    drawWheel();
    renderList();
    input.value = '';
    input.focus();
});
document.getElementById('foodInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('addBtn').click();
});
document.getElementById('clearBtn').addEventListener('click', () => {
    if (foods.length === 0) return;
    if (!confirm('确定清空全部？')) return;
    foods = [];
    saveFoods();
    drawWheel();
    renderList();
    document.getElementById('result').textContent = '';
});
document.getElementById('resetBtn').addEventListener('click', () => {
    foods = [...DEFAULTS];
    saveFoods();
    drawWheel();
    renderList();
    document.getElementById('result').textContent = '';
    showToast('已恢复默认菜单');
});

// ─── 启动 ───
drawWheel();
renderList();
</script>
</body>
</html>
